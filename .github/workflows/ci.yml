name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Byte-compile (catches stale imports)
        run: python -m compileall -q src
      - name: Unit tests
        # Resolver + smoke-import tests only — they do NOT download the
        # dataset or run Harbor (those need API keys + Docker).
        run: pytest tests/ -q
